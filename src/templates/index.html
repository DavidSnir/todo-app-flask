<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>

    <form id="add-form">
      <input
        type="text"
        id="new-title"
        placeholder="What needs to be done?"
        autocomplete="off"
        required
      />
      <button type="submit">Add</button>
    </form>

    <ul id="task-list"></ul>

    <p id="empty-msg" class="empty-msg hidden">No tasks yet. Add one above!</p>
    <p id="error-msg" class="error-msg hidden"></p>
  </div>

  <div id="delete-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Confirm Deletion</h2>
      <p>This task has sub-tasks. Deleting it will delete all sub-tasks. Do you want to proceed?</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-cancel">Cancel</button>
        <button id="modal-confirm" class="btn-confirm-delete">Delete All</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
